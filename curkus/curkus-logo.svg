<svg width="820" height="220" viewBox="0 0 820 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="curkusGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4e50">
        <animate attributeName="stop-color"
                 values="#ff4e50;#fc913a;#f9d423;#ff4e50"
                 dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#fc913a">
        <animate attributeName="stop-color"
                 values="#fc913a;#f9d423;#24c6dc;#fc913a"
                 dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#f9d423">
        <animate attributeName="stop-color"
                 values="#f9d423;#24c6dc;#ff4e50;#f9d423"
                 dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <text x="40" y="130"
        fill="url(#curkusGradient)"
        stroke="url(#curkusGradient)"
        stroke-width="6"
        paint-order="stroke fill"
        stroke-linejoin="round" stroke-linecap="round"
        font-family="JetBrains Mono, Fira Code, Consolas, Menlo, monospace"
        font-size="96" font-weight="800"
        letter-spacing="10"
        style="font-kerning: none;">
    curkus://
  </text>
</svg>
