<svg width="850" height="230" viewBox="0 0 850 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="abikusGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#12c2e9">
        <animate attributeName="stop-color"
                 values="#12c2e9;#c471ed;#f64f59;#12c2e9"
                 dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#c471ed">
        <animate attributeName="stop-color"
                 values="#c471ed;#f64f59;#12c2e9;#c471ed"
                 dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#f64f59">
        <animate attributeName="stop-color"
                 values="#f64f59;#12c2e9;#c471ed;#f64f59"
                 dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <text x="35" y="145"
        fill="url(#abikusGradient)"
        stroke="url(#abikusGradient)"
        stroke-width="4"
        paint-order="stroke fill"
        stroke-linejoin="round" stroke-linecap="round"
        font-family="Segoe UI Black, Arial Black, sans-serif"
        font-size="90" font-weight="900"
        letter-spacing="8"
        style="font-kerning: none;">
    AbikusSudo™
  </text>
</svg>
